	 .sq a{

.stage{
transform:translateX(950px) translateY(-100px);
transform-style:preserve-3d;
perspective:100;
perspective-origin:center center;
animation:rotates 10s infinite;
}
@keyframes rotates{50%{transform:translateY(-100px) translateX(950px) rotateY(360deg)}
100%{transform:translateY(-100px) translateX(950px) rotateX(360deg)}}
.sq{
z-index:2;
position:absolute;
width:100px;
height:100px;
}
.front{
background-size:cover;
background-image: url("bg.jpg");
transform:translateZ(50px) rotateY(0deg)
}
.left{
background-size:cover;
background-image: url("HTML/animeSource/bg5.jpg");
transform:translateX(50px) rotateY(90deg)
}
.back{
background-size:cover;
background-image: url("HTML/animeSource/illusion2.jpg");
transform:translateZ(-50px) rotateY(0deg)
}
.right{
background-size:cover;
background-image: url("HTML/animeSource/bg2.jpg");
transform:translateX(-50px) rotateY(-90deg)
}
	body{
		cursor:url('cur/default.cur'),default;
		padding:0;margin:0;
	}
	input[type="button"]{
		cursor:url('cur/default.cur'),default;
	}
	input[type="text"]{
		cursor:url('cur/text.cur'),text;
		background-color:#777777;
		color:white;
		border:1px solid black;
		border-radius:3px;
		font-family:"楷体";
	}
	input:focus[type="text"]{
		outline: 0;
	}
	input::-webkit-input-placeholder{

	}
